name: Build APK

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          cache: true

      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ runner.os }}-${{ hashFiles('**/gradle-wrapper.properties', '**/*.gradle.kts', '**/gradle.properties') }}

      - name: Get dependencies
        run: flutter pub get

      - name: Create local.properties with API keys
        env:
          K1: mRUou9qWvgvf1ECtK7XT
          K2: WGdyb3FYF3pXMPz0GiW8UDmTall9ZQeI
          C1: ak_SzJfcbrN14bZ
          C2: 1AHZLl18
        run: |
          GROQ="gsk_${K1}${K2}"
          COMP="${C1}${C2}"
          printf "groq.api.key=%s\n" "$GROQ" > android/local.properties
          printf "composio.consumer.key=%s\n" "$COMP" >> android/local.properties
          printf "auth.config.github=ac_YFSxski2H_Uj\nauth.config.gmail=ac__21liBysL4x9\nauth.config.instagram=ac_V1hFeA4Iy2EF\nauth.config.facebook=ac_u1qeC8YT6l90\nauth.config.whatsapp=ac_412d-2RkonCA\nauth.config.googledrive=ac_0_7ITaqzgnMC\nauth.config.discord=ac_Jh_gaZbL4nDx\nauth.config.linkedin=ac_zVwn7nQv2PQZ\nauth.config.reddit=ac_BNHdyMo8wNI9\nauth.config.googlesheets=ac_iR7c2eb7ecrA\nauth.config.youtube=ac_CF5aPWE_QIen\nwhatsapp.phone.number.id=1109964648870017\ninstagram.default.psid=17841463898967744\n" >> android/local.properties
          echo "GROQ_KEY=$GROQ" >> $GITHUB_ENV

      - name: Build APK
        run: flutter build apk --release --dart-define=GROQ_API_KEY=${{ env.GROQ_KEY }}

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: stremini-release-apk
          path: build/app/outputs/flutter-apk/app-release.apk
          retention-days: 30
