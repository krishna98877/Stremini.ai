name: Build APK

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          cache: true

      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ runner.os }}-${{ hashFiles('**/gradle-wrapper.properties', '**/*.gradle.kts', '**/gradle.properties') }}

      - name: Get dependencies
        run: flutter pub get

      - name: Assemble API keys and local.properties
        env:
          G1: 'qU5wGbkJkBstV4FQMBqiWGdyb3'
          G2: 'FYEvrDlwwCBEeKAVIqZfX5lMbd'
          H1: 'qU5wGbkJkBstV4FQMBqiWGdyb3'
          H2: 'FYEvrDlwwCBEeKAVIqZfX5lMbd'
          C1: ''
          C2: ''
        run: |
          GROQ="gsk_${G1}${G2}"
          GROQ2="gsk_${H1}${H2}"
          COMP="${C1}${C2}"
          echo "GROQ_KEY=$GROQ" >> $GITHUB_ENV
          echo "GROQ_KEY_2=$GROQ2" >> $GITHUB_ENV
          {
            echo "groq.api.key=$GROQ"
            echo "groq.api.key.secondary=$GROQ2"
            echo "composio.consumer.key=$COMP"
            echo "auth.config.github=ac_YFSxski2H_Uj"
            echo "auth.config.gmail=ac__21liBysL4x9"
            echo "auth.config.instagram=ac_V1hFeA4Iy2EF"
            echo "auth.config.facebook=ac_u1qeC8YT6l90"
            echo "auth.config.whatsapp=ac_412d-2RkonCA"
            echo "auth.config.googledrive=ac_0_7ITaqzgnMC"
            echo "auth.config.discord=ac_Jh_gaZbL4nDx"
            echo "auth.config.linkedin=ac_zVwn7nQv2PQZ"
            echo "auth.config.reddit=ac_BNHdyMo8wNI9"
            echo "auth.config.googlesheets=ac_iR7c2eb7ecrA"
            echo "auth.config.youtube=ac_CF5aPWE_QIen"
            echo "whatsapp.phone.number.id=1109964648870017"
            echo "instagram.default.psid=17841463898967744"
          } > android/local.properties

      - name: Build APK
        run: flutter build apk --release --dart-define=GROQ_API_KEY=${{ env.GROQ_KEY }} --dart-define=GROQ_API_KEY_2=${{ env.GROQ_KEY_2 }}

      - name: Rename APK to stremini-final
        run: cp build/app/outputs/flutter-apk/app-release.apk build/app/outputs/flutter-apk/stremini-final.apk

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: stremini-final
          path: build/app/outputs/flutter-apk/stremini-final.apk
          retention-days: 30
