name: Build APK

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch: # Allows manual trigger from the GitHub Actions tab

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          cache: true

      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ runner.os }}-${{ hashFiles('**/gradle-wrapper.properties', '**/*.gradle.kts', '**/gradle.properties') }}
          restore-keys: |
            gradle-${{ runner.os }}-

      - name: Get dependencies
        run: flutter pub get

      - name: Build APK
        # API keys are injected via CI secrets (COMPOSIO_CONSUMER_KEY,
        # GROQ_API_KEY). Without these the APK will build but won't have working
        # AI chat or automation — see SECURITY.md for details.
        env:
          COMPOSIO_CONSUMER_KEY: ${{ secrets.COMPOSIO_CONSUMER_KEY }}
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          AUTH_CONFIG_GITHUB: ${{ secrets.AUTH_CONFIG_GITHUB }}
          AUTH_CONFIG_GMAIL: ${{ secrets.AUTH_CONFIG_GMAIL }}
          AUTH_CONFIG_INSTAGRAM: ${{ secrets.AUTH_CONFIG_INSTAGRAM }}
          AUTH_CONFIG_FACEBOOK: ${{ secrets.AUTH_CONFIG_FACEBOOK }}
          AUTH_CONFIG_WHATSAPP: ${{ secrets.AUTH_CONFIG_WHATSAPP }}
          AUTH_CONFIG_GOOGLEDRIVE: ${{ secrets.AUTH_CONFIG_GOOGLEDRIVE }}
          AUTH_CONFIG_DISCORD: ${{ secrets.AUTH_CONFIG_DISCORD }}
          AUTH_CONFIG_LINKEDIN: ${{ secrets.AUTH_CONFIG_LINKEDIN }}
          AUTH_CONFIG_REDDIT: ${{ secrets.AUTH_CONFIG_REDDIT }}
          AUTH_CONFIG_GOOGLESHEETS: ${{ secrets.AUTH_CONFIG_GOOGLESHEETS }}
          AUTH_CONFIG_YOUTUBE: ${{ secrets.AUTH_CONFIG_YOUTUBE }}
          WHATSAPP_PHONE_NUMBER_ID: ${{ secrets.WHATSAPP_PHONE_NUMBER_ID }}
          INSTAGRAM_DEFAULT_PSID: ${{ secrets.INSTAGRAM_DEFAULT_PSID }}
        run: flutter build apk --release --dart-define=GROQ_API_KEY=$GROQ_API_KEY

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: stremini-release-apk
          path: build/app/outputs/flutter-apk/app-release.apk
