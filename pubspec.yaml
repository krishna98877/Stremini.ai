name: stremini_chatbot
description: "A Flutter chatbot application for Stremini AI"
publish_to: "none"

version: 1.0.0+1

environment:
  # flutter_riverpod ^3.0.3 requires Dart >=3.7; lockfile pins >=3.10.3.
  sdk: ">=3.10.3 <4.0.0"

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  flutter_riverpod: ^3.0.3
  http: ^1.5.0
  image_picker: ^1.1.2
  file_picker: ^8.0.0
  mime: ^1.0.5
  shared_preferences: ^2.2.2
  syncfusion_flutter_pdf: ^33.1.47
  url_launcher: ^6.3.1
  
dev_dependencies:
  flutter_launcher_icons: ^0.14.4
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true

  assets:
    - lib/img/logo.jpg
